{% extends 'layouts/base.html' %}
{% set page_title = 'Telegram Login' %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>🚀 Welcome to Clipper</h2>
        <p class="text-muted">Sign in with Telegram to continue</p>
        <form id="tgAuthForm" method="post" action="{{ url_for('auth.tg_login') }}">
            <input type="hidden" name="initData" id="initData">
            <button type="submit" class="btn btn-primary w-100 btn-lg" id="tgLoginBtn">
                Sign in with Telegram
            </button>
        </form>
        <div class="mt-3 text-center small">
            Or <a href="{{ url_for('auth.login') }}">use email/password</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    if (window.Telegram && Telegram.WebApp) {
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        const initData = Telegram.WebApp.initData;
        if (initData) {
            document.getElementById('initData').value = initData;
            document.getElementById('tgAuthForm').submit();
        } else {
            document.getElementById('tgLoginBtn').disabled = true;
            document.getElementById('tgLoginBtn').textContent = 'Open from Telegram to login';
        }
    } else {
        document.getElementById('tgLoginBtn').disabled = true;
        document.getElementById('tgLoginBtn').textContent = 'Telegram WebApp not available';
    }
</script>
{% endblock %}
